<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Registro</title>
</head>
<body style="background-color: rgb(248, 252, 255);">
    

    <main style="background-color: rgb(11, 10, 23); width: auto; height: 80px;
    display: flex;">
        <h1 style="color: white; font-family: Arial, Helvetica, sans-serif;
        margin-left: 430px;">
            Interfaz de registro para nuevos estudiantes
        </h1>
    </main>

    <section style="background-color: white; width: 600px;
    height: 600px;margin-left: 470px; margin-top: 40px;
    border: 1px solid rgb(172, 170, 170);">


        <h1 style="font-family: Arial, Helvetica, sans-serif;
        margin-left: 200px; font-size: 26px; padding-top: 30px;">
            SaberCompartido
        </h1>
        
        <form method="get" action="login.html">
            <section style="display: flex;">
                <div style="width: 295px;
                height: 300px; display: inline-block; margin-left: 5px;">
                    <h2 style="font-family: Arial, Helvetica, sans-serif;
                    font-size: 18px; margin-left: 20px; margin-bottom: 5px;">
                        Nombre completo
                    </h2>
                    <input type="text" id="nombre" name="nombre" required placeholder="Christopher Villarreal"
                    style="margin-left: 20px; width: 220; height: 40px; border: 2px solid gray;
                    border-radius: 10px; font-size: 18px; margin-bottom: 20px;
                    padding-left: 20px;">


                    <h2 style="font-family: Arial, Helvetica, sans-serif;
                    font-size: 18px; margin-left: 20px; margin-top: 0px; margin-bottom: 5px;">
                        Cedula
                    </h2>
                    <input type="text" id="cedula" name="cedula" required placeholder="2300413990"
                    style="margin-left: 20px; width: 220; height: 40px; border: 2px solid gray;
                    border-radius: 10px; font-size: 18px; margin-bottom: 20px;
                    padding-left: 20px;" maxlength="10">


                    <h2 style="font-family: Arial, Helvetica, sans-serif;
                    font-size: 18px; margin-left: 20px; margin-top: 0px; margin-bottom: 5px;">
                        Fecha de nacimiento
                    </h2>
                    <input type="date" id="fechaN" name="fechaN" required
                    style="margin-left: 20px; width: 210px; height: 40px; border: 2px solid gray;
                    border-radius: 10px; font-size: 18px; margin-bottom: 20px;
                    padding-left: 20px;">


                </div>

                <div style=" width: 295px;
                height: 300px; display: inline-block;">
                    <h2 style="font-family: Arial, Helvetica, sans-serif;
                    font-size: 18px; margin-left: 20px; margin-bottom: 5px;">
                        Genero
                    </h2>
                    <select id="Genero" name="Genero"
                    style="margin-left: 20px; width: 240px; height: 45px; border: 2px solid gray;
                    border-radius: 10px; font-size: 18px; margin-bottom: 20px;
                    padding-left: 20px;">
                        <option value="">Seleccione su genero</option>
                        <option value="Masculino">Masculino</option>
                        <option value="Femenino">Femenino</option>
                        <option value="Otro">Otro</option>
                    </select>


                    <h2 style="font-family: Arial, Helvetica, sans-serif;
                    font-size: 18px; margin-left: 20px; margin-top: 0px; margin-bottom: 5px;">
                        Correo Electronico
                    </h2>
                    <input type="email" id="correo" name="correo" required placeholder="usuario@ejemplo.com"
                    style="margin-left: 20px; width: 220; height: 40px; border: 2px solid gray;
                    border-radius: 10px; font-size: 18px; margin-bottom: 20px;
                    padding-left: 20px;">


                    <h2 style="font-family: Arial, Helvetica, sans-serif;
                    font-size: 18px; margin-left: 20px; margin-top: 0px; margin-bottom: 5px;">
                        Contraseña
                    </h2>
                    <input type="password" id="contraseña" name="contraseña" required placeholder="Entre 8 y 16"
                    style="margin-left: 20px; width: 220; height: 40px; border: 2px solid gray;
                    border-radius: 10px; font-size: 18px; margin-bottom: 20px;
                    padding-left: 20px;" minlength="8" maxlength="16">
                </div>
            </section>
            

            <button style="background-color: rgb(22, 22, 72); color: white;
            font-family: Arial, Helvetica, sans-serif; font-size: 18px;
            width: 350px; height: 55px; border-radius: 10px;
            margin-left: 130px; margin-top: 30px;">
                <a href="PanelP.html" style="text-decoration: none; color: white;">
                    Registrarse
                </a>
            </button>
        </form>

        <div style="display: flex;">
                <p style="font-family: Arial, Helvetica, sans-serif;
                font-size: 16px; color: gray; font-weight: bold;
                margin-left: 170px; margin-top: 50px;">
                    ¿Ya tienes una cuenta?
                </p>
                <a href="login.html" style="font-family: Arial, Helvetica, sans-serif;
                font-size: 16px; color: black; font-weight: bold;
                margin-top: 50px; margin-left: 5px; text-decoration: none;">
                    Iniciar sesión
                </a>
            </div>
        
        
    </section>

</body>
</html>
