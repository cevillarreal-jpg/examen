<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
</head>
<body style="background-color: rgb(248, 252, 255);">
    
    <section style="background-color: white; width: 420px;
    height: 600px; box-shadow: 0px 2px 6px; border-radius: 10px;
    margin-left: 600px; margin-top: 40px;">
        <h1 style="font-family: Arial, Helvetica, sans-serif;
        margin-left: 100px; font-size: 26px; padding-top: 80px;">
            SaberCompartido
        </h1>
        <p style="font-family: Arial, Helvetica, sans-serif; font-weight: bold;
        color: gray; margin-left: 70px; margin-bottom: 60px;">
            Sistema de ascesoramiento estudiantil
        </p>

        <form method="get" action="PanelP.html">
            <label style="font-family: Arial, Helvetica, sans-serif;
            font-size: 16px; margin-left: 40px;">
                Correo Electronico:
            </label><br>


            <input type="email" id="correo" name="correo" required placeholder="usuario@ejemplo.com"
            style="margin-left: 40px; margin-top: 10px;
            width: 350px; height: 50px; border: 2px solid gray;
            border-radius: 10px; font-size: 18px; margin-bottom: 20px;">


            <label style="font-family: Arial, Helvetica, sans-serif;
            font-size: 16px; margin-left: 40px;">
                Contraseña:
            </label><br>


            <input type="password" id="contraseña" name="contraseña" required placeholder="Debe contener entre 8 y 16 caracteres"
            minlength="8" maxlength="16" 
            style="margin-left: 40px; margin-top: 10px;
            width: 350px; height: 50px; border: 2px solid gray;
            border-radius: 10px; font-size: 18px">


            <button style="background-color: rgb(32, 32, 80); color: white;
            font-weight: bold; width: 300px; height: 50px; border-radius: 10px;
            margin-left: 70px; margin-top: 40px; font-size: 18px;">
                Iniciar sesión
            </button>

            <div style="display: flex;">
                <p style="font-family: Arial, Helvetica, sans-serif;
                font-size: 16px; color: gray; font-weight: bold;
                margin-left: 70px; margin-top: 50px;">
                    ¿No tienes cuenta?
                </p>
                <a href="registro.html" style="font-family: Arial, Helvetica, sans-serif;
                font-size: 16px; color: black; font-weight: bold;
                margin-top: 50px; margin-left: 5px; text-decoration: none;">
                    Registrate aqui
                </a>
            </div>

            

        </form>
        
        
    </section>

</body>
</html>
