<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio de Sesión</title>
</head>

<body style="background-color: rgb(231, 250, 231); font-family: Arial, sans-serif; text-align: center;">

    <section id="logoapp">
        <figure>
            <img src="../img/imagen.jpg" alt="Logo de FitConnet" style="width: 150px; margin-top: 20px;">
        </figure>
    </section>

    <h1>Inicio de Sesión FitConnet</h1>

    <section id="iniciosesion"
        style="background-color: white; width: 320px; margin: 80px auto; padding: 25px; border-radius: 10px;">

        <h1 style="color: darkgreen;">Inicio de Sesión</h1>

        <form method="get" action="../PaginaPrincipal.html">

            <label for="correo"><strong>Correo electrónico:</strong></label>
            <br>
            <input type="email" id="correo" name="correo" required
                placeholder="tu@email.com" size="30">
            <br><br>

            <label for="password"><strong>Contraseña:</strong></label>
            <br>
            <input type="password" id="password" name="password" required
                minlength="8" maxlength="16" placeholder="********" size="30">
            <br><br>

            <label for="tipoUsuario"><strong>Tipo de usuario:</strong></label>
            <br>
            <select id="tipoUsuario" name="tipoUsuario" required>
                <option value="">Selecciona una opción</option>
                <option value="deportista">Deportista</option>
                <option value="entrenador">Entrenador</option>
            </select>
            <br><br>

            <input type="submit" value="Iniciar sesión">

        </form>
    </section>

    <footer></footer>
        <p>&copy; 2023 FitConnet. Todos los derechos reservados.</p>
    </footer>

</body>

</html>
